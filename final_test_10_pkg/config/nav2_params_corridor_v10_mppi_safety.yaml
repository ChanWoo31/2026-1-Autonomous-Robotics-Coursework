# v10 MPPI: final_test_8 기반 + MPPI local controller 실험. 실제 충돌 방지는 cmd_vel_safety_filter_v9가 담당
bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base_link
    transform_tolerance: 1.5
    filter_duration: 0.3
    # maze_explorer는 자체적으로 실패 goal을 버리고 다음 goal을 고르므로,
    # NavigateToPose BT에서는 후진 recovery가 없는 단순 재계획 트리를 사용한다.
    default_nav_to_pose_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_w_replanning_time.xml"
    default_nav_through_poses_bt_xml: "$(find-pkg-share nav2_bt_navigator)/behavior_trees/navigate_through_poses_w_replanning_and_recovery.xml"
    always_reload_bt_xml: false
    goal_blackboard_id: goal
    path_blackboard_id: path
    navigators: ['navigate_to_pose']
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"

controller_server:
  ros__parameters:
    controller_frequency: 20.0
    enable_stamped_cmd_vel: false
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.001
    min_theta_velocity_threshold: 0.001
    failure_tolerance: 10.0
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    controller_plugins: ["FollowPath"]
    
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.03  # 미세한 움직임도 인정하여 조기 포기 방지
      movement_time_allowance: 60.0
      
    goal_checker:
      stateful: true
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.18
      yaw_goal_tolerance: 6.28  # 프론티어 탐색 시 방향은 중요하지 않음
      
    FollowPath:
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 30              # 20Hz * 0.05s = 약 1.5초 예측. 막힌 곳에서 더 자주 판단
      model_dt: 0.05
      batch_size: 1100            # CPU 버벅임을 줄이기 위한 균형값
      iteration_count: 1
      temperature: 0.28
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: false            # true면 /trajectories가 무거워질 수 있음
      reset_period: 1.0
      regenerate_noises: false
      retry_attempt_limit: 1
      prune_distance: 0.55
      transform_tolerance: 0.2
      max_robot_pose_search_dist: 1.2
      enforce_path_inversion: false

      # Burger 좁은 미로용 속도 범위. 최종 제한은 velocity_smoother + safety_filter가 한 번 더 담당한다.
      vx_max: 0.20
      vx_min: 0.0                 # 입구 방향 되감기 방지를 위해 controller 후진 샘플링 금지
      vy_max: 0.0
      wz_max: 1.45
      vx_std: 0.08
      vy_std: 0.01
      wz_std: 0.70

      TrajectoryVisualizer:
        trajectory_step: 6
        time_step: 3

      critics: [
        "ConstraintCritic",
        "CostCritic",
        "GoalCritic",
        "GoalAngleCritic",
        "PathAlignCritic",
        "PathFollowCritic",
        "PathAngleCritic",
        "PreferForwardCritic",
        "VelocityDeadbandCritic"
      ]

      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.0

      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.5
        critical_cost: 240.0
        consider_footprint: false
        collision_cost: 1000000.0
        near_goal_distance: 0.25
        trajectory_point_step: 2

      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        threshold_to_consider: 0.65

      GoalAngleCritic:
        enabled: false            # frontier 탐색은 yaw가 중요하지 않음
        cost_power: 1
        cost_weight: 1.0
        threshold_to_consider: 0.35

      PathAlignCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        max_path_occupancy_ratio: 0.25
        trajectory_point_step: 3
        threshold_to_consider: 0.35
        offset_from_furthest: 5
        use_path_orientations: false

      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 9.0
        offset_from_furthest: 4
        threshold_to_consider: 0.30

      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 5.5
        offset_from_furthest: 3
        threshold_to_consider: 0.55
        max_angle_to_furthest: 1.6
        forward_preference: true

      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0
        threshold_to_consider: 0.75

      VelocityDeadbandCritic:
        enabled: true
        cost_power: 1
        cost_weight: 4.0
        deadband_velocities: [0.015, 0.0, 0.05]

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 8.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base_link
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.02
      robot_radius: 0.105          # Nav2 costmap과 MPPI 충돌 모델 기준
      plugins: ["obstacle_layer", "inflation_layer"] # 연산량 확보를 위해 voxel 제외
      
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        inflation_radius: 0.14      # 파란 cost band가 통로 전체를 덮지 않게 얇게 유지
        cost_scaling_factor: 6.0
        
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          obstacle_max_range: 2.5
          raytrace_max_range: 3.0
          inf_is_valid: true

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base_link
      transform_tolerance: 1.5
      # Global planner만 약간 덜 보수적으로 둔다.
      # 실제 충돌 회피는 local_costmap + MPPI cost critic + safety filter가 담당한다.
      robot_radius: 0.105
      resolution: 0.02
      track_unknown_space: true
      plugins: ["static_layer", "inflation_layer"]
      
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: true
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 1.0
          clearing: true
          marking: true
          data_type: "LaserScan"
          raytrace_max_range: 3.5
          obstacle_max_range: 3.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: true
        
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        # 전역 경로가 좁은 통로를 막힌 곳으로 판단하지 않게 완화
        inflation_radius: 0.12
        cost_scaling_factor: 6.0
      always_send_full_costmap: true

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      # 짧은 0.5~1.2m goal을 쓰므로 planner tolerance가 크면 현재 위치 근처에서 goal succeeded가 반복된다.
      tolerance: 0.25
      use_astar: true
      allow_unknown: true

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_costmap_topic: global_costmap/costmap_raw
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_behaviors/Spin"
    backup:
      plugin: "nav2_behaviors/BackUp"
    wait:
      plugin: "nav2_behaviors/Wait"
    local_frame: odom
    global_frame: map
    robot_base_frame: base_link
    transform_timeout: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.45
    min_rotational_vel: 0.35
    rotational_acc_lim: 2.2
    enable_stamped_cmd_vel: false

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [0.22, 0.0, 1.45]
    min_velocity: [0.0, 0.0, -1.45]
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0
    max_accel: [1.40, 0.0, 2.1]
    max_decel: [-1.5, 0.0, -2.2]
    odom_topic: "odom"
    odom_duration: 0.1
    enable_stamped_cmd_vel: false

# Collision Monitor는 좁은 통로에서 거짓 양성(False Positive)으로 로봇을 정지시키므로 비활성화 또는 대폭 완화
collision_monitor:
  ros__parameters:
    enabled: false
    base_frame_id: "base_link"
    odom_frame_id: "odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "cmd_vel_nav"
    state_topic: "collision_monitor_state"
    transform_tolerance: 1.5
    source_timeout: 5.0
    enable_stamped_cmd_vel: false
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "circle"
      radius: 0.12 # 로봇 쉘 바로 바깥까지만 체크
      action_type: "stop"
      min_points: 4
      visualize: true
      polygon_pub_topic: "polygon_stop"
      enabled: false
    observation_sources: ["scan"]
    scan:
      source_timeout: 0.2
      type: "scan"
      topic: "/scan"
      enabled: true

cmd_vel_safety_filter:
  ros__parameters:
    nav_cmd_topic: "/cmd_vel_nav"
    safe_cmd_topic: "/cmd_vel"
    scan_topic: "/scan"
    max_linear: 0.20
    max_reverse: 0.06
    max_angular: 1.55
    # laser TF를 yaw 3.14159로 publish하는 현재 구성에서는 LaserScan raw frame의 정면이 pi 근처일 수 있다.
    # RViz에서 /scan 정면 sector가 반대로 보이면 실행 시 front_angle_offset:=0.0으로 비교한다.
    front_angle_offset: 3.14159
    front_stop: 0.085
    front_slow: 0.215
    side_stop: 0.080
    side_slow: 0.130
    front_half_width_deg: 14.0
    wide_half_width_deg: 24.0
    corner_angle_deg: 38.0
    corner_half_width_deg: 10.0
    side_angle_deg: 82.0
    side_half_width_deg: 12.0
    side_turn_stop: 0.075
    side_turn_slow: 0.125
    corner_stop: 0.095
    corner_slow: 0.165
    side_linear_stop: 0.065
    side_linear_slow: 0.125
    side_imbalance_allowance: 0.025
    wall_nudge_angular: 0.16
    min_creep_linear: 0.045
    pure_turn_linear_epsilon: 0.010
    preserve_turn_angular: 0.080
    command_timeout: 0.35
    scan_timeout: 0.60
